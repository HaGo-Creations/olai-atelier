# .github/workflows/deploy.yml
#
# Builds the Flutter web frontend and deploys it to GitHub Pages automatically
# whenever code is pushed to the main branch.
#
# Prerequisites (one-time setup in GitHub repo Settings):
#   Settings → Pages → Source → "GitHub Actions"
#
# The API_BASE_URL baked into the build comes from frontend/assets/env.txt.
# Update that file to point to your Hugging Face Space URL before pushing.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:          # allows manual trigger from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build web
        working-directory: frontend
        run: |
          flutter build web \
            --release \
            --base-href "/${{ github.event.repository.name }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4