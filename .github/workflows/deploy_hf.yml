# .github/workflows/deploy_hf.yml
#
# Pushes backend/ to the Hugging Face Space whenever backend code changes
# land on main.
#
# One-time setup:
#   1. Hugging Face → Settings → Access Tokens → New token (write scope,
#      scoped to the gemma-educator Space).
#   2. GitHub repo → Settings → Secrets and variables → Actions →
#      New repository secret named HF_TOKEN, paste the token.

name: Deploy Backend to Hugging Face

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Push backend/ to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USER: HaGo-Creations
          HF_SPACE: hago-creations/gemma-educator
        run: |
          set -euo pipefail

          if [ -z "${HF_TOKEN}" ]; then
            echo "::error::HF_TOKEN secret is not set. Create it in repo Settings → Secrets and variables → Actions."
            exit 1
          fi

          # Stage the backend/ directory as the root of a fresh repo, then
          # force-push it to the Hugging Face Space. This avoids the quirks
          # of `git subtree push` and keeps the Space history clean.
          STAGE="$(mktemp -d)"
          cp -a backend/. "${STAGE}/"
          cd "${STAGE}"

          git init -q -b main
          git config user.email "ci@github.com"
          git config user.name  "GitHub Actions"

          # Disable LFS smudge in case the Space has LFS-tracked files
          # (avoids the runner trying to fetch them during clone/push).
          git config --global lfs.fetchexclude "*"

          git add -A
          git commit -q -m "Sync from ${GITHUB_REPOSITORY}@${GITHUB_SHA::7}"

          git remote add hf "https://${HF_USER}:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}"
          git push --force hf main