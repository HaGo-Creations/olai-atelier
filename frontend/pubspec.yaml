name: gemma_educator_agent
description: AI Agentic Assistant for educators — offline-first with online capabilities.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.5.1
  http: ^1.2.2
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  path: ^1.9.0
  file_picker: ^8.1.2
  desktop_drop: ^0.4.4
  cross_file: ^0.3.4+2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  flutter_markdown: ^0.7.3+1
  flutter_math_fork: ^0.7.2
  markdown: ^7.2.2
  flutter_dotenv: ^5.1.0
  connectivity_plus: ^6.0.5
  uuid: ^4.5.1
  intl: ^0.20.2
  image_picker: ^1.1.2
  pdf: ^3.10.8
  archive: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/env.txt
    - assets/i18n/en.json